<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vive Volando Nómade | Consola de Mando Atlas</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    
    <style>
        :root {
            --cian: #00d4ff;     /* Aéreas */
            --naranja: #ff9100;  /* Publicaciones */
            --verde: #39ff14;    /* Nómade */
            --rojo: #ff003c;     /* Videos 8K */
            --morado: #bc13fe;   /* Relatos */
            --oro: #FFD700;
            --dark-pure: #000000;
            --console-bg: rgba(0, 0, 0, 0.98);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #000; overflow: hidden; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
        }
        
        #viewport { perspective: 1200px; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100%; transform-origin: bottom; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }

        /* MODOS DE VISTA */
        .view-flat #map { transform: rotateX(0deg) scale(1.0); }
        .view-oblique #map { transform: rotateX(25deg) scale(1.5); }

        #videoVisor {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.98); z-index:9999; align-items:center; justify-content:center;
            flex-direction: column;
        }

        .navbar-brand {
            position: fixed; top: 25px; left: 30px; z-index: 2000;
            font-weight: 800; font-size: 1.3rem; color: #fff; text-decoration: none;
            letter-spacing: -1px; text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        .navbar-brand span { color: var(--cian); }

        .top-controls { position: fixed; top: 25px; right: 30px; z-index: 2000; display: flex; gap: 10px; }
        .control-group { background: rgba(0,0,0,0.85); padding: 4px; border-radius: 4px; display: flex; gap: 4px; border: 1px solid #222; }
        
        .view-btn {
            background: #111; border: 1px solid #333; color: #666;
            padding: 6px 12px; font-size: 9px; cursor: pointer; 
            text-transform: uppercase; font-weight: bold; transition: 0.2s;
        }
        .view-btn.active { background: var(--cian); color: #000; border-color: var(--cian); }

        .console-list {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: var(--console-bg); border-top: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 25px; z-index: 3000; backdrop-filter: blur(10px);
        }

        .console-section { display: flex; align-items: center; gap: 12px; }

        .social-btn {
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            color: #555; text-decoration: none; font-size: 14px; transition: 0.3s;
        }
        .social-btn:hover { border-color: var(--cian); color: var(--cian); }

        .nav-item {
            background: transparent; border: 1px solid #333; color: #555;
            padding: 8px 14px; border-radius: 4px; font-size: 10px;
            font-weight: 700; text-transform: uppercase; transition: 0.3s all; cursor: pointer;
        }

        #btn-fly.active { color: var(--cian); border-color: var(--cian); }
        #btn-pub.active { color: var(--naranja); border-color: var(--naranja); }
        #btn-nomad.active { color: var(--verde); border-color: var(--verde); }
        #btn-video.active { color: var(--rojo); border-color: var(--rojo); }
        #btn-audio.active { color: var(--morado); border-color: var(--morado); }

        .btn-quote { border: 2px solid #fff !important; color: #fff !important; margin: 0 10px; }
        .btn-quote:hover { background: #fff; color: #000 !important; }

        .btn-paypal {
            background: transparent; border: 1px solid #0070ba; padding: 5px 12px;
            border-radius: 4px; transition: 0.3s; display: flex; align-items: center;
        }

        .leaflet-popup-content-wrapper { background: #000 !important; color: #fff !important; border: 1px solid #333 !important; border-radius: 2px !important; }
        .btn-expediente { display: block; width: 100%; background: #fff; color: #000; text-align: center; padding: 10px; margin-top: 10px; font-weight: bold; text-decoration: none; font-size: 10px; text-transform: uppercase; }
        .btn-cine { display: block; width: 100%; background: var(--rojo); color: #fff; text-align: center; padding: 10px; margin-top: 10px; font-weight: bold; border:none; cursor:pointer; font-size: 10px; }
    </style>
</head>
<body class="view-flat">

    <div id="videoVisor">
        <button onclick="cerrarVideo()" style="position:absolute; top:20px; right:20px; color:#fff; background:none; border:1px solid #fff; padding:10px; cursor:pointer; font-family:monospace;">CERRAR [X]</button>
        <div id="videoContainer" style="width:85%; height:80%; box-shadow: 0 0 50px rgba(255,0,60,0.2);"></div>
        <h2 id="videoTitulo" style="color:#fff; margin-top:20px; font-family:monospace; letter-spacing:3px; font-size:14px;"></h2>
    </div>

    <a class="navbar-brand" href="#">VIVE VOLANDO NÓMADE<span>.</span></a>

    <div class="top-controls">
        <div class="control-group">
            <button class="view-btn" id="angle-oblique" onclick="setViewMode('oblique')">Oblicuo</button>
            <button class="view-btn active" id="angle-flat" onclick="setViewMode('flat')">Plano</button>
        </div>
        <div class="control-group">
            <button class="view-btn active" id="layer-radar" onclick="setMapLayer('radar')">Radar</button>
            <button class="view-btn" id="layer-sat" onclick="setMapLayer('sat')">Satélite</button>
        </div>
    </div>

    <div id="viewport"><div id="map"></div></div>

    <div class="console-list">
        <div class="console-section">
            <img src="fotos/logo.png" alt="Vive Volando" style="height: 45px; filter: brightness(1.5);">
            <div style="display:flex; gap:8px; margin-left:15px;">
                <a href="https://www.facebook.com/haroldo.tricallotis" target="_blank" class="social-btn"><i class="bi bi-facebook"></i></a>
                <a href="https://www.instagram.com/vivevolandonomade/" target="_blank" class="social-btn"><i class="bi bi-instagram"></i></a>
                <a href="https://www.youtube.com/@vivevolandonomade" target="_blank" class="social-btn"><i class="bi bi-youtube"></i></a>
            </div>
        </div>

        <div class="console-section">
            <button class="nav-item active" id="btn-fly" onclick="toggleCapa('fly')">Aéreas</button>
            <button class="nav-item active" id="btn-pub" onclick="toggleCapa('pub')">Reportajes</button>
            <button class="nav-item active" id="btn-nomad" onclick="toggleCapa('nomad')">Nómade</button>
            <button class="nav-item btn-quote" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSfg4V1pd1oViKIjLLZs4MZOEwG7lubmo-wijLkuLV0RgqxdRQ/viewform', '_blank')">COTIZAR</button>
            <button class="nav-item active" id="btn-video" onclick="toggleCapa('video')">Videos 8K</button>
            <button class="nav-item active" id="btn-audio" onclick="toggleCapa('audio')">Relatos</button>
        </div>

        <div class="console-section">
            <a href="https://www.paypal.com/paypalme/Vivevolandonomade" target="_blank" class="btn-paypal">
                <img src="https://img.shields.io/badge/Donar-PayPal-blue?style=flat-square&logo=paypal" alt="Donar">
            </a>
            <div style="font-size: 8px; color: #444; text-align: right; letter-spacing: 1px; margin-left: 15px;">
                STATUS: ONLINE<br>CORE_SYSTEM_v3.2
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let allData = [];
        let markers = L.layerGroup();
        let filtrosActivos = { fly: true, pub: true, nomad: true, video: true, audio: true };

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-33.448, -70.665], 4);
        const radar = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        markers.addTo(map);

        function setViewMode(mode) {
            document.body.className = (mode === 'oblique') ? 'view-oblique' : 'view-flat';
            document.getElementById('angle-oblique').classList.toggle('active', mode === 'oblique');
            document.getElementById('angle-flat').classList.toggle('active', mode === 'flat');
            setTimeout(() => map.invalidateSize(), 800);
        }

        function setMapLayer(layer) {
            if (layer === 'radar') { map.removeLayer(sat); radar.addTo(map); } 
            else { map.removeLayer(radar); sat.addTo(map); }
            document.getElementById('layer-radar').classList.toggle('active', layer === 'radar');
            document.getElementById('layer-sat').classList.toggle('active', layer === 'sat');
        }

        fetch('data/puntos_mapa.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                allData = data;
                renderizarMapa();
            });

        function obtenerColorCapa(capa) {
            const c = capa.toLowerCase();
            if (c.includes('fly') || c.includes('vuelo')) return 'var(--cian)';
            if (c.includes('pub') || c.includes('patrimonio')) return 'var(--naranja)';
            if (c.includes('nomad')) return 'var(--verde)';
            if (c.includes('video')) return 'var(--rojo)';
            return 'var(--morado)';
        }

       function renderizarMapa() {
            markers.clearLayers();
            
            // ORDENAR: Las fotos de 5 estrellas se dibujan AL FINAL para que queden encima de las normales
            let datosOrdenados = [...allData].sort((a, b) => (a.rating || 0) - (b.rating || 0));

            datosOrdenados.forEach(p => {
                const capaKey = p.capa.toLowerCase().includes('vuelo') ? 'fly' : 
                               p.capa.toLowerCase().includes('patrimonio') ? 'pub' : p.capa.toLowerCase();

                if (filtrosActivos[capaKey] || filtrosActivos[p.capa.toLowerCase()]) {
                    const esElite = p.rating === 5;
                    const mColor = obtenerColorCapa(p.capa);

                    const marker = L.circleMarker([p.lat, p.lon], {
                        radius: esElite ? 12 : 6, 
                        fillColor: mColor, 
                        color: esElite ? "#fff" : "transparent",
                        weight: 2, 
                        fillOpacity: 0.9
                    });

                    // Estrellas doradas solo si es Rating 5 (Bridge)
                    let estrellasHtml = esElite ? '<div style="color:var(--oro); font-size:16px; margin-bottom:5px;">★★★★★</div>' : '';

                    let popupContent = `
                        <div style="width:220px; background:#000; text-align:center; padding:5px;">
                            ${estrellasHtml}
                            <h4 style="margin:5px 0; font-size:12px; color:#fff; text-transform:uppercase; letter-spacing:1px;">${p.titulo}</h4>
                            ${p.youtube_id ? 
                                `<button onclick="abrirVideo('${p.youtube_id}', '${p.titulo}')" class="btn-cine">▶ MODO CINE 8K</button>` :
                                `<img src="${p.thumb}" style="width:100%; border:1px solid #222; border-radius:4px;">`
                            }
                            <p style="font-size:10px; color:#666; margin-top:8px;">${p.descripcion || ''}</p>
                            <a href="galeria.html?zona=${p.zona}" class="btn-expediente">ABRIR EXPEDIENTE</a>
                        </div>
                    `;

                    marker.bindPopup(popupContent).addTo(markers);
                }
            });
        }

        function abrirVideo(id, titulo) {
            document.getElementById('videoTitulo').innerText = titulo.toUpperCase();
            document.getElementById('videoContainer').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            document.getElementById('videoVisor').style.display = 'flex';
        }

        function cerrarVideo() {
            document.getElementById('videoVisor').style.display = 'none';
            document.getElementById('videoContainer').innerHTML = '';
        }

        function toggleCapa(capa) {
            filtrosActivos[capa] = !filtrosActivos[capa];
            const btn = document.getElementById(`btn-${capa}`);
            if(btn) btn.classList.toggle('active');
            renderizarMapa();
        }
    </script>
</body>
</html>
