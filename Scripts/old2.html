<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vive Volando Nómade | Mapa de Proyectos</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00d4ff; /* Cian original de tu web */
            --dark: #050505;
            --glow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--dark); color: #eee;
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* Cabecera idéntica a tu original */
        .navbar-brand {
            font-weight: 800; letter-spacing: -1px; font-size: 1.5rem;
            position: fixed; top: 20px; left: 30px; z-index: 1000;
            color: #fff !important; text-decoration: none;
        }
        .navbar-brand span { color: var(--accent); }

        /* El Mapa como HERO */
        #map { 
            position: absolute; top: 0; bottom: 70px; width: 100%; z-index: 1;
            background: #080808;
        }

        /* Consola de Navegación Inferior */
        .console-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: rgba(5, 5, 5, 0.95); border-top: 1px solid #222;
            display: flex; justify-content: center; align-items: center; gap: 15px;
            z-index: 1000; backdrop-filter: blur(10px);
        }

        .nav-btn {
            background: transparent; border: 1px solid #333; color: #888;
            padding: 8px 20px; border-radius: 4px; font-size: 12px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s all;
        }
        .nav-btn:hover, .nav-btn.active {
            border-color: var(--accent); color: var(--accent);
            box-shadow: var(--glow); background: rgba(0, 212, 255, 0.05);
        }

        /* Botón de Cotización (El eje central) */
        .btn-quote {
            border: 2px solid var(--accent); color: #fff;
            background: rgba(0, 212, 255, 0.1); margin: 0 10px;
            padding: 10px 25px;
        }
        .btn-quote:hover {
            background: var(--accent); color: #000;
        }

        /* Popups de Mapa Estilo Cian */
        .leaflet-popup-content-wrapper {
            background: #111 !important; color: #fff !important;
            border: 1px solid var(--accent) !important; border-radius: 4px !important;
        }
        .leaflet-popup-tip { background: var(--accent) !important; }
        
        .custom-popup img { width: 100%; border-radius: 2px; margin-top: 8px; border: 1px solid #333; }
        .btn-action {
            display: block; width: 100%; padding: 8px; margin-top: 10px;
            background: var(--accent); color: #000; text-align: center;
            font-weight: bold; text-decoration: none; font-size: 11px;
        }

        /* Modal para el Formulario */
        .modal-fullscreen-custom {
            display: none; position: fixed; z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98);
        }
    </style>
</head>
<body>

    <a class="navbar-brand" href="#">VIVE VOLANDO NÓMADE<span>.</span></a>

    <div id="map"></div>

    <div class="console-nav">
        <button class="nav-btn active" id="btn-fly" onclick="toggleCapa('fly')">Vuelos</button>
        <button class="nav-btn active" id="btn-pub" onclick="toggleCapa('pub')">Reportajes</button>
        
        <button class="nav-btn btn-quote" onclick="abrirContacto()">
            <i class="bi bi-briefcase"></i> COTIZAR PROYECTO
        </button>
        
        <button class="nav-btn active" id="btn-video_yt" onclick="toggleCapa('video_yt')">Canal YT</button>
        <button class="nav-btn" style="opacity: 0.4; border-style: dashed;">Audios</button>
    </div>

    <div id="modalContacto" class="modal-fullscreen-custom">
        <div class="container py-5" style="max-width: 800px; height: 100%; overflow-y: auto;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-white fw-bold">SOLICITUD DE COTIZACIÓN</h2>
                <button onclick="cerrarContacto()" class="btn btn-outline-light btn-sm">CERRAR X</button>
            </div>
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfg4V1pd1oViKIjLLZs4MZOEwG7lubmo-wijLkuLV0RgqxdRQ/viewform?embedded=true" 
                    width="100%" height="800" frameborder="0" marginheight="0" marginwidth="0">Cargando…</iframe>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let allData = [];
        let markers = L.layerGroup();
        let filtrosActivos = { fly: true, pub: true, video_yt: true };

        const map = L.map('map', { zoomControl: false }).setView([-34.6, -60.1], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        markers.addTo(map);

        // Fetch de los datos (Asegúrate de tener el JSON en la misma carpeta o ajustar ruta)
        fetch('data/puntos_mapa.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                renderizarMapa();
            });

        function renderizarMapa() {
            markers.clearLayers();
            allData.forEach(p => {
                const slugCapa = p.capa.toLowerCase().split(' ')[0]; 
                if (!filtrosActivos[slugCapa] && !filtrosActivos[p.capa.toLowerCase().replace(' ', '_')]) return;

                let content = `
                    <div style="width:200px;">
                        <h5 style="margin:0; color:var(--accent); font-size:14px; font-weight:700;">${p.titulo}</h5>
                        <p style="font-size:10px; color:#aaa; margin-bottom:10px;">${p.zona.toUpperCase()}</p>
                        ${p.youtube_id ? 
                            `<iframe width="100%" height="110" src="https://www.youtube-nocookie.com/embed/${p.youtube_id}" frameborder="0" allowfullscreen></iframe>` :
                            `<img src="${p.thumb}" class="img-fluid" onerror="this.src='https://via.placeholder.com/200x120?text=Registro'">`
                        }
                        <a href="galeria.html?zona=${p.zona}" class="btn-action">VER DETALLES</a>
                    </div>
                `;
                
                L.circleMarker([p.lat, p.lon], {
                    radius: 7,
                    fillColor: p.youtube_id ? "#ff0044" : "#00d4ff",
                    color: "#fff",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8
                }).bindPopup(content).addTo(markers);
            });
        }

        function toggleCapa(capa) {
            filtrosActivos[capa] = !filtrosActivos[capa];
            document.getElementById(`btn-${capa}`).classList.toggle('active');
            renderizarMapa();
        }

        function abrirContacto() { document.getElementById('modalContacto').style.display = 'block'; }
        function cerrarContacto() { document.getElementById('modalContacto').style.display = 'none'; }
    </script>
</body>
</html>
